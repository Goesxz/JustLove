<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eu & Você</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="splash.css">
</head>
<body>

  <!-- Cortina de saída -->
  <div id="curtain"></div>

  <!-- Fundo de grade sutil -->
  <div class="grid-bg"></div>

  <!-- Canvas de partículas -->
  <canvas id="canvas"></canvas>

  <!-- Cantos decorativos -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Texto lateral -->
  <p class="side-text">Nossa história</p>

  <!-- CONTEÚDO CENTRAL -->
  <main class="splash">

    <!-- Linha superior -->
    <div class="top-line">
      <span class="top-line__rule"></span>
      <span class="top-line__text">10 de março de 2026</span>
      <span class="top-line__rule"></span>
    </div>

    <!-- Monograma -->
    <div class="monogram-wrap">
      <div class="monogram-glow"></div>
      <p class="monogram">A<em>&amp;</em>L</p>
    </div>

    <!-- Título -->
    <h1 class="title">
      A nossa história<br>
      <span>começa aqui</span>
    </h1>

    <!-- Divisor -->
    <div class="divider">
      <div class="divider__line"></div>
      <div class="divider__dot"></div>
      <div class="divider__line"></div>
    </div>

    <!-- Data -->
    <p class="date">Juntos há</p>

    <!-- Contador dinâmico -->
    <p class="counter" id="contador">— — —</p>

    <!-- Botão de entrada -->
    <div class="enter-wrap">
      <button class="enter-btn" id="enterBtn">
        <span>Entrar</span>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </main>

  <script src="splash.js"></script>
</body>
</html>
